name: Bug Report
description: Report a reproducible bug in Newsletter AI
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please include enough detail for reproduction.
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Run ...
        2. Use config ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior / Logs
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / Commit
      placeholder: e.g. v0.1.0 or commit SHA
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - low
        - medium
        - high
        - critical
